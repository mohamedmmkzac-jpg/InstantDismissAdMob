name: Build Tweak Package
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: theos/setup-theos@v1
        with:
          archs: 'arm64 arm64e'

      - name: Compile and Package DEB
        run: |
          make package FINALPACKAGE=1

      - name: Upload Finished DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airvoy-InstantDismiss-DEB
          path: packages/*.deb
