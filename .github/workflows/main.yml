name: Build Tweak

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang fakeroot lzma liblzma-dev libssl-dev git make info
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Install Theos & SDK
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
        mkdir -p ~/theos/sdks
        tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
        rm iPhoneOS14.5.sdk.tar.xz

    - name: Build Tweak (.deb)
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InstantDismissAdMob-Deb
        path: packages/*.deb
