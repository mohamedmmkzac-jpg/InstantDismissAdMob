name: Build Tweak Package
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Create Project Files Offline
        run: |
          cat << 'EOF' > control
          Package: com.mohamed.instantdismiss
          Name: InstantDismissAdMob
          Depends: mobilesubstrate
          Version: 1.0.0
          Architecture: iphoneos-arm
          Description: Instantly dismiss Google Ads for Airvoy App.
          Maintainer: Mohamed Khaled
          Author: Mohamed Khaled
          Section: Tweaks
          EOF

          cat << 'EOF' > Makefile
          TARGET := iphone:clang:latest:14.0
          ARCHS = arm64 arm64e
          
          include $(THEOS)/makefiles/common.mk
          
          TWEAK_NAME = InstantDismissAdMob
          
          InstantDismissAdMob_FILES = Tweak.x
          InstantDismissAdMob_CFLAGS = -fobjc-arc -w -DTHEOS_LEAN_AND_MEAN
          
          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF

          cat << 'EOF' > Tweak.x
          #import <Foundation/Foundation.h>
          
          @interface NSObject
          - (void)dismissViewControllerAnimated:(BOOL)flag completion:(void (^)(void))completion;
          @end
          
          %hook GADFullScreenAdViewController
          
          - (void)viewDidAppear:(BOOL)animated {
              %orig;
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(0.5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  [self dismissViewControllerAnimated:YES completion:nil];
              });
          }
          
          %end
          EOF

          cat << 'EOF' > InstantDismissAdMob.plist
          {
              Filter = {
                  Bundles = ( "com.apple.UIKit" );
              };
          }
          EOF

      - name: Install Theos and iOS SDK From GitLab Mirror
        run: |
          export THEOS=~/theos
          
          # التحميل من شبكة GitLab البديلة والمؤمنة ضد الحجب وقص الروابط
          git clone --depth=1 --recursive https://gitlab.com $THEOS
          
          # تحميل الـ iOS SDK النظيف مباشرة بدون جيت هب
          mkdir -p $THEOS/sdks
          curl -ksL "https://gitlab.com" -o ~/theos/sdks.zip
          unzip -q ~/theos/sdks.zip -d ~/theos/
          rm -rf $THEOS/sdks && mv ~/theos/sdks-master $THEOS/sdks
          rm ~/theos/sdks.zip

      - name: Compile and Package DEB
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Upload Finished DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airvoy-InstantDismiss-DEB
          path: packages/*.deb
