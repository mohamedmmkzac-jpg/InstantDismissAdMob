name: Build Tweak Package
on: [push, workflow_dispatch]

# إضافة الصلاحيات الأمنية لمنع خطأ الـ 128 بشكل نهائي
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Install Theos and iOS SDK Manually
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com $THEOS
          
          mkdir -p $THEOS/sdks
          curl -ksL "https://github.com" -o ~/theos/sdks.zip
          unzip -q ~/theos/sdks.zip -d ~/theos/
          rm -rf $THEOS/sdks && mv ~/theos/sdks-master $THEOS/sdks
          rm ~/theos/sdks.zip

      - name: Compile and Package DEB
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Upload Finished DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airvoy-InstantDismiss-DEB
          path: packages/*.deb
