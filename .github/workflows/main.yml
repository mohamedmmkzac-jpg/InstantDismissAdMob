name: Build Tweak Package
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Manual Pull Code
        run: |
          # السحب اليدوي للمستودع لتخطي أخطاء جيت هب نهائياً
          git clone https://github.com{{ github.repository }}.git .
          git checkout ${{ github.ref_name }}

      - name: Install Theos and iOS SDK Manually
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com $THEOS
          
          mkdir -p $THEOS/sdks
          curl -ksL "https://github.com" -o ~/theos/sdks.zip
          unzip -q ~/theos/sdks.zip -d ~/theos/
          rm -rf $THEOS/sdks && mv ~/theos/sdks-master $THEOS/sdks
          rm ~/theos/sdks.zip

      - name: Compile and Package DEB
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Upload Finished DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airvoy-InstantDismiss-DEB
          path: packages/*.deb
